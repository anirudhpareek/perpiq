<!doctype html>
<html lang="en" class="overscroll-none">
	<head>
		<!-- General -->
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, height=device-height"
		/>

		<!-- Favicon -->
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="%sveltekit.assets%/assets/brand/favicon.png"
		/>
		<link rel="apple-touch-icon" href="%sveltekit.assets%/assets/brand/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<meta name="theme-color" content="#050507" />

		<!-- Inject Svelte head -->
		%sveltekit.head%
	</head>

	<body
		data-sveltekit-preload-data="hover"
		class="bg-black font-display text-gecko-gray tabular-nums"
	>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
