name: Seed market data

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: seed
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger seed endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret not set" >&2
            exit 1
          fi
          curl -sS --fail-with-body --max-time 90 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://perpiq.vercel.app/api/jobs/seed"
